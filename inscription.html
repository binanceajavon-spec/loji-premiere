<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Loji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Container pour la vidéo en arrière-plan */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* Overlay sombre */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        /* Contenu principal */
        .content-wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Carte compacte */
        .auth-card {
            max-width: 380px;
            width: 100%;
            padding: 28px 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeInUp 0.5s ease-out;
        }

        /* Logo compact */
        .logo-img {
            height: 55px;
            width: auto;
            object-fit: contain;
        }

        /* Espacement réduit */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0057FF;
            box-shadow: 0 0 0 3px rgba(0, 87, 255, 0.1);
        }

        /* Champ mot de passe */
        .password-container {
            position: relative;
        }

        .password-container input {
            padding-right: 38px;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            padding: 0;
        }

        .password-toggle:hover {
            color: #0057FF;
        }

        .password-toggle .material-icons {
            font-size: 18px;
        }

        /* Bouton principal */
        .btn-primary {
            width: 100%;
            background: #0057FF;
            color: white;
            padding: 10px 0;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: #0041CC;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Séparateur */
        .separator {
            display: flex;
            align-items: center;
            margin: 18px 0;
        }

        .separator-line {
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .separator-text {
            padding: 0 12px;
            font-size: 0.7rem;
            color: #9ca3af;
        }

        /* Lien */
        .link {
            color: #0057FF;
            font-weight: 500;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .link:hover {
            color: #0041CC;
        }

        .text-small {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 4px;
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 22px 20px;
                max-width: 100%;
            }
            
            .logo-img {
                height: 45px;
            }
            
            .content-wrapper {
                padding: 16px;
                align-items: center;
            }
        }
    </style>
</head>

<body>
    <!-- Vidéo locale en arrière-plan -->
    <div class="video-background">
        <video autoplay muted loop playsinline id="bgVideo">
            <source src="videos/background.mp4" type="video/mp4">
        </video>
    </div>
    
    <!-- Overlay sombre -->
    <div class="video-overlay"></div>

    <!-- Contenu -->
    <div class="content-wrapper">
        <div class="auth-card">
            <!-- Logo compact -->
            <div class="text-center mb-4">
                <img src="images/footer.png" alt="Loji" class="logo-img mx-auto">
                <p class="text-gray-500 text-xs mt-1">Créez votre compte</p>
            </div>

            <!-- Formulaire -->
            <form id="registerForm">
                <!-- Nom d'utilisateur -->
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" id="username" placeholder="ex: Jean Dupont" required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="votre@email.com" required>
                </div>

                <!-- Téléphone -->
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" id="phone" placeholder="+225 01 23 45 67 89" required>
                </div>

                <!-- Mot de passe -->
                <div class="form-group">
                    <label>Mot de passe</label>
                    <div class="password-container">
                        <input type="password" id="password" placeholder="Min. 6 caractères" required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <span class="material-icons" id="eyeIcon">visibility_off</span>
                        </button>
                    </div>
                </div>

                <!-- Bouton -->
                <button type="submit" class="btn-primary" id="submitBtn">
                    Créer mon compte
                </button>
            </form>

            <!-- Séparateur -->
            <div class="separator">
                <div class="separator-line"></div>
                <span class="separator-text">ou</span>
                <div class="separator-line"></div>
            </div>

            <!-- Lien connexion -->
            <div class="text-center">
                <p class="text-gray-500 text-xs">Déjà un compte ?</p>
                <a href="connexion.html" class="link text-sm">Se connecter</a>
            </div>
        </div>
    </div>

    <!-- SCRIPTS DANS LE BON ORDRE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            console.log('📍 Page: inscription.html');
            console.log('🔐 Auth status:', window.auth ? 'Auth chargé' : 'Auth non chargé');

            // Gestion de la vidéo
            const video = document.getElementById('bgVideo');
            if (video) {
                video.play().catch(() => {
                    document.body.addEventListener('click', function playVideo() {
                        video.play();
                        document.body.removeEventListener('click', playVideo);
                    }, { once: true });
                });
            }

            // Œil pour mot de passe
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (togglePassword && passwordInput && eyeIcon) {
                togglePassword.addEventListener('click', function () {
                    const type = passwordInput.type === 'password' ? 'text' : 'password';
                    passwordInput.type = type;
                    eyeIcon.textContent = type === 'text' ? 'visibility' : 'visibility_off';
                    eyeIcon.style.color = type === 'text' ? '#0057FF' : '#9ca3af';
                });
            }

            // Redirection si déjà connecté
            if (window.auth && window.auth.isLoggedIn()) {
                console.log('⚠️ Déjà connecté, redirection vers index.html');
                window.location.href = 'index.html';
                return;
            }

            // Gestion du formulaire
            const form = document.getElementById('registerForm');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                console.log('📝 Formulaire d\'inscription soumis');

                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const password = document.getElementById('password').value;

                // Validations
                if (!username) {
                    alert('❌ Veuillez entrer un nom d\'utilisateur');
                    return;
                }
                if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    alert('❌ Veuillez entrer un email valide');
                    return;
                }
                if (!phone) {
                    alert('❌ Veuillez entrer un numéro de téléphone');
                    return;
                }
                if (password.length < 6) {
                    alert('❌ Le mot de passe doit contenir au moins 6 caractères');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Création en cours...';

                try {
                    console.log('📤 Envoi des données:', { email, password, name: username, phone });

                    // Vérifier que l'API est disponible
                    if (!window.api) {
                        throw new Error('API non disponible. Vérifiez que api.js est bien chargé.');
                    }

                    const result = await window.auth.register(email, password, username, phone);
                    console.log('📝 Résultat inscription:', result);

                    if (result.success) {
                        alert('🎉 Compte créé avec succès !');
                        window.location.href = 'user-dashboard.html';
                    } else {
                        alert('❌ ' + (result.error || 'Erreur lors de l\'inscription'));
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Créer mon compte';
                    }
                } catch (error) {
                    console.error('❌ Erreur:', error);
                    alert('❌ Erreur de connexion au serveur: ' + error.message);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Créer mon compte';
                }
            });
        });
    </script>
</body>

</html>
