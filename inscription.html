<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Loji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-image: url('images/conex.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        /* Overlay pour améliorer la lisibilité */
        .auth-overlay {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
        }

        .auth-card {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(226, 232, 240, 0.9);
        }

        /* Style pour le champ password avec œil */
        .password-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #718096;
            padding: 4px;
        }

        .password-toggle:hover {
            color: #0057FF !important;
        }

        /* Style pour le logo */
        .logo-img {
            height: 70px;
            width: auto;
            object-fit: contain;
        }

        /* Suppression du WhatsApp float */
        .whatsapp-float {
            display: none !important;
        }

        /* Responsive pour mobile */
        @media (max-width: 640px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }
            
            .auth-card {
                margin: 40px auto;
                padding: 30px 20px;
            }

            body {
                background-attachment: scroll;
            }
        }
    </style>
</head>

<body>

    <div class="auth-card bg-white auth-overlay">
        <!-- Logo -->
        <div class="text-center mb-8">
            <img src="images/footer.png" alt="Loji" class="logo-img mx-auto mb-4">
            <p class="text-gray-600">Créez votre compte</p>
        </div>

        <!-- Formulaire inscription -->
        <form id="registerForm">
            <div class="space-y-4">
                <!-- Nom d'utilisateur -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Nom d'utilisateur
                    </label>
                    <input type="text" id="username"
                        class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0057FF] focus:border-transparent transition-all"
                        placeholder="Votre nom d'utilisateur" required>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Adresse email
                    </label>
                    <input type="email" id="email"
                        class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0057FF] focus:border-transparent transition-all"
                        placeholder="votre@email.com" required>
                </div>

                <!-- Numéro -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Numéro de téléphone
                    </label>
                    <input type="tel" id="phone"
                        class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0057FF] focus:border-transparent transition-all"
                        placeholder="+225 01 23 45 67 89" required>
                </div>

                <!-- Mot de passe avec œil -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Créer un mot de passe
                    </label>
                    <div class="password-container">
                        <input type="password" id="password"
                            class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0057FF] focus:border-transparent pr-10 transition-all"
                            placeholder="Min. 6 caractères" required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <span class="material-icons" id="eyeIcon">visibility_off</span>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">Minimum 6 caractères</p>
                </div>

                <!-- Bouton inscription (BLEU PURE) -->
                <button type="submit"
                    class="w-full bg-[#0057FF] text-white py-3.5 rounded-xl hover:bg-[#0041CC] transition-colors font-medium text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all">
                    Créer mon compte
                </button>
            </div>
        </form>

        <!-- Séparateur -->
        <div class="flex items-center my-6">
            <div class="flex-1 border-t border-gray-300"></div>
            <span class="px-3 text-gray-500 text-sm">ou</span>
            <div class="flex-1 border-t border-gray-300"></div>
        </div>

        <!-- Lien connexion (BLEU PURE) -->
        <div class="text-center">
            <p class="text-gray-600">Déjà un compte ?</p>
            <a href="connexion.html" class="text-[#0057FF] font-medium hover:text-[#0041CC] transition-colors">
                Se connecter
            </a>
        </div>
    </div>

    <!-- CHARGER LES SCRIPTS DANS LE BON ORDRE -->
    <script src="auth.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            console.log('📍 Page: inscription.html');
            console.log('🔐 Auth status:', window.auth ? 'Auth chargé' : 'Auth non chargé');
            console.log('👤 Logged in?', window.auth?.isLoggedIn() ? 'OUI' : 'NON');

            // Fonctionnalité œil pour mot de passe
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (togglePassword && passwordInput && eyeIcon) {
                togglePassword.addEventListener('click', function () {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);

                    // Changer l'icône
                    if (type === 'text') {
                        eyeIcon.textContent = 'visibility';
                        eyeIcon.style.color = '#0057FF';
                    } else {
                        eyeIcon.textContent = 'visibility_off';
                        eyeIcon.style.color = '#718096';
                    }
                });
            }

            // Vérifier si déjà connecté
            if (window.auth && window.auth.isLoggedIn()) {
                console.log('⚠️ Déjà connecté, redirection vers index.html');
                window.location.href = 'index.html';
                return;
            }

            // Gestion du formulaire
            document.getElementById('registerForm').addEventListener('submit', async function (e) {
                e.preventDefault();
                console.log('📝 Formulaire d\'inscription soumis');

                // Récupérer les valeurs des champs
                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;
                const password = document.getElementById('password').value;

                // Validation de l'email
                if (!validateEmail(email)) {
                    alert('❌ Veuillez entrer une adresse email valide');
                    return;
                }

                // Validation du mot de passe
                if (password.length < 6) {
                    alert('❌ Le mot de passe doit contenir au moins 6 caractères');
                    return;
                }

                // Désactiver le bouton
                const button = e.target.querySelector('button[type="submit"]');
                const originalText = button.textContent;
                button.disabled = true;
                button.textContent = 'Création en cours...';

                try {
                    // Appel à auth.register avec les 4 arguments
                    console.log('📤 Envoi des données:', { email, password, name: username, phone });

                    const result = await auth.register(email, password, username, phone);

                    console.log('📝 Résultat inscription:', result);

                    if (result.success) {
                        alert('🎉 Compte créé avec succès !');
                        window.location.href = 'user-dashboard.html';
                    } else {
                        alert('❌ Erreur: ' + result.error);
                        button.disabled = false;
                        button.textContent = originalText;
                    }
                } catch (error) {
                    console.error('❌ Erreur:', error);
                    alert('❌ Erreur lors de la création du compte');
                    button.disabled = false;
                    button.textContent = originalText;
                }
            });

            // Fonction de validation d'email
            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }
        });
    </script>
</body>

</html>
