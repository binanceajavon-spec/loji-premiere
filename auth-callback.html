<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation - Loji</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="api.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
        <div class="text-6xl mb-4" id="icon">📧</div>
        <h1 class="text-2xl font-bold mb-4" id="title">Confirmation en cours...</h1>
        <div id="message" class="text-gray-600 mb-4">Veuillez patienter...</div>
        <div id="loading" class="animate-pulse">⏳</div>
    </div>

    <script>
        async function handleConfirmation() {
            try {
                // Récupérer le hash de l'URL (tout après #)
                const hash = window.location.hash.substring(1);
                const params = new URLSearchParams(hash);
                
                const accessToken = params.get('access_token');
                const refreshToken = params.get('refresh_token');
                const type = params.get('type');
                
                console.log('🔑 Type:', type);
                console.log('🔑 Access token reçu:', accessToken ? 'OUI' : 'NON');
                
                if (accessToken) {
                    document.getElementById('title').textContent = '✅ Email confirmé !';
                    document.getElementById('message').innerHTML = 'Votre compte a été confirmé avec succès.<br>Redirection en cours...';
                    document.getElementById('icon').innerHTML = '🎉';
                    document.getElementById('loading').innerHTML = '';
                    
                    // Sauvegarder les tokens
                    localStorage.setItem('jwt', accessToken);
                    localStorage.setItem('refresh_token', refreshToken);
                    
                    // Récupérer l'utilisateur
                    const { data: { user }, error } = await window.supabase.auth.getUser(accessToken);
                    if (user && !error) {
                        localStorage.setItem('user', JSON.stringify(user));
                        console.log('✅ Utilisateur:', user.email);
                    }
                    
                    // Rediriger après 2 secondes
                    setTimeout(() => {
                        window.location.href = 'user-dashboard.html';
                    }, 2000);
                    
                } else {
                    document.getElementById('title').textContent = '❌ Erreur';
                    document.getElementById('message').innerHTML = 'Token de confirmation introuvable.<br>Redirection vers la page de connexion...';
                    document.getElementById('icon').innerHTML = '⚠️';
                    document.getElementById('loading').innerHTML = '';
                    
                    setTimeout(() => {
                        window.location.href = 'connexion.html';
                    }, 3000);
                }
                
            } catch (error) {
                console.error('❌ Erreur:', error);
                document.getElementById('title').textContent = '❌ Erreur';
                document.getElementById('message').innerHTML = error.message + '<br>Redirection vers la page de connexion...';
                document.getElementById('icon').innerHTML = '❌';
                document.getElementById('loading').innerHTML = '';
                
                setTimeout(() => {
                    window.location.href = 'connexion.html';
                }, 3000);
            }
        }
        
        // Exécuter la confirmation
        handleConfirmation();
    </script>
</body>
</html>
