<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="style-annonces.css">

    <style>
        /* STYLES MINIMALISTES */
        body {
            padding-top: 0;
            margin: 0;
            background-color: #ffffffee;
        }

        /* Navbar fixe */
        #nav-multifunction-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: white;
        }

        /* Contenu décalé */
        #annonceContent {
            margin-top: 80px;
            min-height: calc(100vh - 80px);
        }

        @media (max-width: 768px) {
            #annonceContent {
                margin-top: 7px;
            }
        }

        /* Lightbox au-dessus de tout */
        #lightboxModal {
            z-index: 99999 !important;
        }

        /* ========== STYLES FOOTER ========== */
        .full-width-footer {
            width: 100%;
            background: #1a1a1a;
            color: #fff;
            padding: 40px 5% 20px;
            margin-top: 60px;
            font-family: Arial, sans-serif;
        }

        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-bottom: 30px;
        }

        .footer-column h3 {
            color: #fff;
            font-size: 1rem;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            position: relative;
            padding-bottom: 8px;
        }

        .footer-column h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 30px;
            height: 2px;
            background: #00A3FF;
        }

        .footer-column .links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .footer-column .links div {
            color: #b0b0b0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .footer-column .links div:hover {
            color: #00A3FF;
            transform: translateX(5px);
        }

        .footer-social-contact {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .social-icons {
            display: flex;
            gap: 15px;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .social-icon:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 15px #00A3FF;
        }

        .social-icon.facebook:hover { background: #1877f2; }
        .social-icon.instagram:hover { background: #e4405f; }
        .social-icon.tiktok:hover { background: #000000; }

        .contact-info {
            color: #b0b0b0;
            font-size: 0.95rem;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .contact-info div {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .contact-info div i {
            color: #00A3FF;
            font-size: 1rem;
        }

        .footer-logo {
            text-align: center;
            padding-top: 10px;
        }

        .footer-logo img {
            max-width: 100px;
            opacity: 0.8;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
        }

        .footer-logo img:hover {
            opacity: 1;
            filter: drop-shadow(0 0 8px #00A3FF);
        }

        @media (max-width: 768px) {
            .footer-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 25px;
            }
            .footer-social-contact {
                flex-direction: row;
                align-items: center;
                padding: 15px 0;
            }
            .contact-info {
                text-align: right;
                gap: 15px;
            }
            .full-width-footer {
                padding: 30px 5% 15px;
            }
        }

        @media (max-width: 480px) {
            .footer-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .footer-social-contact {
                flex-direction: column;
                align-items: flex-start;
            }
            .contact-info {
                text-align: left;
            }
            .footer-logo img {
                max-width: 80px;
            }
        }
    </style>
</head>

    <!-- SCRIPTS DANS LE BON ORDRE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>

    <!-- SCRIPT DE CHARGEMENT SÉQUENTIEL -->
    <script>
        (function () {
            console.log('🚀 Démarrage sécurisé - Version Supabase');

            const loadScript = (src, callback) => {
                // Vérifier si le script est déjà chargé
                if (document.querySelector(`script[src="${src}"]`)) {
                    console.log(`✅ Script déjà chargé: ${src}`);
                    if (callback) callback();
                    return;
                }
                
                const script = document.createElement('script');
                script.src = src;
                script.onload = callback;
                script.onerror = () => console.error('❌ Erreur chargement:', src);
                document.head.appendChild(script);
            };

            // Attendre que api.js soit prêt
            const waitForApi = (callback) => {
                if (window.api && window.api.getAnnonceById) {
                    callback();
                } else {
                    setTimeout(() => waitForApi(callback), 100);
                }
            };

            loadScript('nav-multifunction.js', function () {
                console.log('✅ Navbar chargée');

                setTimeout(() => {
                    if (window.renderNavMultifunction) {
                        window.renderNavMultifunction();
                        console.log('✅ Navbar initialisée');

                        setTimeout(() => {
                            // Charger le script de détails (version Supabase)
                            loadScript('app-details-clean.js', function () {
                                console.log('✅ App-details chargé');

                                // Attendre que l'API soit prête
                                waitForApi(() => {
                                    if (window.initAnnonceDetails) {
                                        window.initAnnonceDetails();
                                        console.log('✅ Détails annonce initialisés avec Supabase');
                                    }
                                });
                            });
                        }, 200);
                    }
                }, 150);
            });
        })();
    </script>

    <!-- Correction des boutons flottants - s'arrêtent au début du footer -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const actionButtons = document.querySelector('.flex.justify-between.gap-2, [class*="bg-blue-600"].flex, .fixed-bottom');
                const footer = document.querySelector('.full-width-footer');
                
                if (!actionButtons || !footer) return;
                
                function checkScroll() {
                    if (window.innerWidth <= 768) {
                        const footerTop = footer.getBoundingClientRect().top;
                        const windowHeight = window.innerHeight;
                        
                        if (footerTop < windowHeight - 100) {
                            actionButtons.style.position = 'absolute';
                            actionButtons.style.bottom = 'auto';
                            actionButtons.style.top = (footerTop - actionButtons.offsetHeight - 10) + 'px';
                        } else {
                            actionButtons.style.position = 'fixed';
                            actionButtons.style.bottom = '0';
                            actionButtons.style.top = 'auto';
                        }
                    }
                }
                
                window.addEventListener('scroll', checkScroll);
                window.addEventListener('resize', checkScroll);
                checkScroll();
            }, 500);
        });
    </script>
